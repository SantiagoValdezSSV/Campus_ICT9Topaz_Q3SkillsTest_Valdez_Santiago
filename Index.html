<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-image: url('https://img.freepik.com/free-photo/top-view-business-office-desk-background-applying-job-form-pen-pencil-eyeglasses-tree-wooden-table-background-with-copy-space_1921-21.jpg?semt=ais_user_personalization&w=740&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.65);
            color: white;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
        }

        .form-control, .form-select {
            background-color: rgba(255,255,255,0.9);
        }

      
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://media.istockphoto.com/id/843134660/vector/laptop-computer-notebook-and-cursor-click-thin-line-icon-linear-vector-symbol.jpg?s=612x612&w=0&k=20&c=ff6gyz8iEdtAXBKHMklxnUeQK5pD8-p-XqlNEPzRkzM="
                     
                     width="40"
                     height="40"
                     class="me-2">
                
            </a>

            <form class="d-flex">
                <input type="text" class="form-control me-2" placeholder="Search">
                <button type="button" class="btn btn-primary">Search</button>
            </form>
        </div>
    </nav>


<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    
    <div class="glass-card shadow-lg">

     <h3 class="text-center mb-3">REGISTRATION</h3>
     <p class="small text-center text-light">
            Please fill out all required fields to create your account.
     </p>

     <form>

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Contact Number</label>
                <input type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control">
            </div>
            

            <div class="mb-3">
                <label for="emailAddress" class="form-label">Email Address</label>
                <input type="text" class="form-control" placeholder="Enter your Email">
            </div>

            <div class="mb-3">
                <label for="emailAddress" class="form-label">Password</label>
                <input type="text" class="form-control" placeholder="Enter your Passwrod">
            </div>

            <div class="mb-3">
                <label for="emailAddress" class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="Username">
            </div>
        </select>
            </div>

            
 
            <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">

                <div class="glass-card shadow-lg text-center">
            

                    <div class="mb-3">
                        <img id="Profile"
                             src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png" class="rounded-circle border" width="120"
                             height="120"
                             style="object-fit: cover;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Upload Photo</label>
                        <input type="file" class="form-control">
                    </div>
         
                    <div class="form-check mb-3 text-start">
            <input class="form-check-input" type="checkbox" id="terms">
               <label class="form-check-label" for="terms">
                I accept the Terms and Conditions
                        </label>
                       <div class="d-grid">
                <button type="submit" style="color:black; background-color: skyblue;" class="btn btn-custom">
    Create My Account
</button>
            </div>
                    </div>

            </div>

            
                </div>
            
            </div>

            

        </form>

    </div>

</div>

</html>
